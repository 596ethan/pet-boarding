services:
  mysql:
    image: mysql:8.4
    container_name: pet-boarding-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${PET_BOARDING_MYSQL_ROOT_PASSWORD:-petboarding_root}
      MYSQL_DATABASE: ${PET_BOARDING_MYSQL_DATABASE:-pet_boarding}
      MYSQL_USER: ${PET_BOARDING_DATASOURCE_USERNAME:-petboarding}
      MYSQL_PASSWORD: ${PET_BOARDING_DATASOURCE_PASSWORD:-petboarding}
    ports:
      - "${PET_BOARDING_MYSQL_PORT:-13306}:3306"
    volumes:
      - pet_boarding_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pet_boarding_mysql_data:
